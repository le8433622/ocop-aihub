name: CI for Production Foundation

on:
  pull_request:
    branches:
      - feature/prod-foundation
  push:
    branches:
      - feature/prod-foundation

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: ocopdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres" --health-interval=10s --health-timeout=5s --health-retries=5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'

      - name: Install dependencies
        run: npm install

      - name: Prisma Generate
        env:
          DATABASE_URL: postgres://postgres:password@localhost:5432/ocopdb
        run: npx prisma generate

      - name: Run Migrations (CI)
        env:
          DATABASE_URL: postgres://postgres:password@localhost:5432/ocopdb
        run: npx prisma migrate dev --name ci --create-db false

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npm run typecheck

      - name: Run Tests
        run: npm test || true
