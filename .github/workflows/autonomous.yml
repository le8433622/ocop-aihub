name: 🤖 Autonomous AIHub

on:
  push:
    branches:
      - main
  repository_dispatch:
    types: [execute_task]
  issues:
    types: [labeled]
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:
    inputs:
      task:
        description: 'Task description'
        required: true
        type: string

jobs:
  execute:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Opencode
        run: |
          npm install -g opencode || true
          if ! command -v opencode &> /dev/null; then
            echo "Trying direct download..."
            PLATFORM=$(uname -s | tr '[:upper:]' '[:lower:]')
            ARCH=$(uname -m)
            [ "$ARCH" = "arm64" ] && ARCH="arm64" || ARCH="x64"
            LATEST=$(curl -sL https://api.github.com/repos/anomalyco/opencode/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
            FILENAME="opencode-${PLATFORM}-${ARCH}"
            URL="https://github.com/anomalyco/opencode/releases/download/${LATEST}/${FILENAME}"
            mkdir -p "$HOME/.opencode/bin"
            curl -fSL "$URL" -o "$HOME/.opencode/bin/opencode"
            chmod +x "$HOME/.opencode/bin/opencode"
            echo "$HOME/.opencode/bin" >> $GITHUB_PATH
          fi
          opencode --version || echo "Opencode not available"

      - name: Get Task
        id: task
        run: |
          echo "Event: ${{ github.event_name }}"
          
          if [[ "${{ github.event.inputs.task }}" != "" ]]; then
            echo "task=${{ github.event.inputs.task }}" >> $GITHUB_OUTPUT
            echo "source=workflow_dispatch"
          elif [[ "${{ github.event.client_payload.task }}" != "" ]]; then
            echo "task=${{ github.event.client_payload.task }}" >> $GITHUB_OUTPUT
            echo "source=repository_dispatch"
          else
            echo "Checking for trigger-labeled issues..."
            gh issue list --label trigger --state open --json number,title | tee issues.json
            ISSUE_NUM=$(cat issues.json | jq -r '.[0].number // empty')
            if [[ -n "$ISSUE_NUM" ]]; then
              ISSUE_TITLE=$(cat issues.json | jq -r '.[0].title')
              echo "task=${ISSUE_TITLE#Auto Task: }" >> $GITHUB_OUTPUT
              echo "source=issue_$ISSUE_NUM"
              echo "issue_number=$ISSUE_NUM" >> $GITHUB_OUTPUT
            else
              echo "task=" >> $GITHUB_OUTPUT
              echo "source=none"
            fi
          fi

      - name: Show Task
        if: steps.task.outputs.task != ''
        run: |
          echo "=== TASK ==="
          echo "${{ steps.task.outputs.task }}"
          echo "=== SOURCE ==="
          echo "${{ steps.task.outputs.source }}"
          echo "============="

      - name: Execute Task
        if: steps.task.outputs.task != ''
        run: |
          opencode "${{ steps.task.outputs.task }}" || true

      - name: Commit Changes
        id: commit
        if: steps.task.outputs.task != ''
        run: |
          git config user.name "AIHub Bot"
          git config user.email "aihub@ocop.ai"
          git add -A
          git diff --cached --stat || echo "No changes"
          git commit -m "[AIHub] ${{ steps.task.outputs.task }}" || echo "No commit needed"
          git push origin main || echo "Push failed or no changes"

      - name: Report
        run: |
          echo "Done - source: ${{ steps.task.outputs.source }}"