name: 🤖 Autonomous AIHub

on:
  repository_dispatch:
    types: [execute_task]
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      task:
        description: 'Task description'
        required: true
        type: string

jobs:
  execute:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Opencode
        run: |
          npm install -g opencode
          opencode --version

      - name: Get Task
        id: task
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${{ github.event.inputs.task }}" != "" ]]; then
            echo "task=${{ github.event.inputs.task }}" >> $GITHUB_OUTPUT
            echo "source=workflow_dispatch" >> $GITHUB_OUTPUT
            exit 0
          elif [[ "${{ github.event.client_payload.task }}" != "" ]]; then
            echo "task=${{ github.event.client_payload.task }}" >> $GITHUB_OUTPUT
            echo "source=repository_dispatch" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "Checking for issues with trigger label..."
          ISSUES=$(gh api repos/${{ github.repository }}/issues -F state=open -F per_page=10 --jq '.[] | select(.labels[] | .name == "trigger") | {number, title}')
          
          if [[ "$ISSUES" == "[]" || -z "$ISSUES" ]]; then
            echo "No trigger-labeled issues found"
            echo "task=" >> $GITHUB_OUTPUT
            echo "source=none" >> $GITHUB_OUTPUT
          else
            ISSUE_NUM=$(echo "$ISSUES" | head -1 | jq -r '.number')
            ISSUE_TITLE=$(echo "$ISSUES" | head -1 | jq -r '.title')
            TASK="${ISSUE_TITLE#Auto Task: }"
            echo "task=$TASK" >> $GITHUB_OUTPUT
            echo "source=issue_$ISSUE_NUM" >> $GITHUB_OUTPUT
            echo "issue_number=$ISSUE_NUM" >> $GITHUB_OUTPUT
          fi

      - name: Execute Task
        if: steps.task.outputs.task != ''
        id: execute
        run: |
          echo "Task from: ${{ steps.task.outputs.source }}"
          echo "Executing: ${{ steps.task.outputs.task }}"
          
          RESULT=$(opencode "${{ steps.task.outputs.task }}" 2>&1 || echo "EXECUTION_COMPLETED")
          echo "result=$RESULT" >> $GITHUB_OUTPUT
          
          echo "✅ Opencode execution completed"
          echo "$RESULT"

      - name: Commit and Push
        if: steps.task.outputs.task != ''
        id: commit
        run: |
          if git diff --stat | grep -q .; then
            git config user.name "AIHub Bot"
            git config user.email "aihub@ocop.ai"
            
            TASK="${{ steps.task.outputs.task }}"
            git add -A
            git commit -m "[AIHub] $TASK" || echo "No changes to commit"
            
            BRANCH="autonomous/$(date +%s)"
            git checkout -b $BRANCH
            git push -u origin $BRANCH || echo "Push failed"
            
            echo "branch=$BRANCH" >> $GITHUB_OUTPUT
            echo "✅ Changes committed and pushed to $BRANCH"
          else
            echo "No files changed"
            echo "branch=" >> $GITHUB_OUTPUT
          fi

      - name: Create PR
        if: steps.commit.outputs.branch != ''
        run: |
          BRANCH="${{ steps.commit.outputs.branch }}"
          TASK="${{ steps.task.outputs.task }}"
          
          gh auth login --with-token <<< "${{ secrets.GITHUB_TOKEN }}"
          
          PR_URL=$(gh pr create \
            --title "[AIHub] $TASK" \
            --body "## Task
$TASK

## Generated by Autonomous AIHub

🤖 This PR was automatically generated by the OCOP AIHub autonomous system." \
            --head "$BRANCH" \
            --base main 2>/dev/null || echo "")
          
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
          echo "✅ PR created: $PR_URL"

      - name: Remove trigger label
        if: steps.task.outputs.issue_number
        run: |
          gh api repos/${{ github.repository }}/issues/${{ steps.task.outputs.issue_number }}/labels/trigger -X DELETE

      - name: Report Status
        run: |
          echo "## 🎉 Autonomous Execution Complete"
          echo "- Source: ${{ steps.task.outputs.source }}"
          echo "- Branch: ${{ steps.commit.outputs.branch }}"
          echo "- PR: ${{ steps.commit.outputs.pr_url }}"