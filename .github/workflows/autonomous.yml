name: 🤖 Autonomous AIHub

on:
  push:
    branches:
      - main
  repository_dispatch:
    types: [execute_task]
  issues:
    types: [labeled]
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:
    inputs:
      task:
        description: 'Task description'
        required: true
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  execute:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Opencode
        run: |
          curl -fsSL https://opencode.ai/install | bash
          export PATH="$PATH:/home/runner/.opencode/bin"
          opencode --version

      - name: Get Task
        id: task
        run: |
          echo "Event: ${{ github.event_name }}"
          
          # Check for trigger files first
          if ls .aihub/triggers/*.json 1> /dev/null 2>&1; then
            echo "Found trigger files..."
            TRIGGER_FILE=$(ls -t .aihub/triggers/*.json | head -1)
            if [[ -n "$TRIGGER_FILE" ]]; then
              TASK=$(cat "$TRIGGER_FILE" | jq -r '.task // empty')
              TASK_ID=$(cat "$TRIGGER_FILE" | jq -r '.taskId // empty')
              echo "task=$TASK" >> $GITHUB_OUTPUT
              echo "source=api_trigger"
              echo "task_id=$TASK_ID" >> $GITHUB_OUTPUT
              rm -f "$TRIGGER_FILE"
              echo "Using trigger file: $TRIGGER_FILE"
            fi
          elif [[ "${{ github.event.inputs.task }}" != "" ]]; then
            echo "task=${{ github.event.inputs.task }}" >> $GITHUB_OUTPUT
            echo "source=workflow_dispatch"
          elif [[ "${{ github.event.client_payload.task }}" != "" ]]; then
            echo "task=${{ github.event.client_payload.task }}" >> $GITHUB_OUTPUT
            echo "source=repository_dispatch"
          else
            echo "Checking for trigger-labeled issues..."
            gh issue list --label trigger --state open --json number,title | tee issues.json
            ISSUE_NUM=$(cat issues.json | jq -r '.[0].number // empty')
            if [[ -n "$ISSUE_NUM" ]]; then
              ISSUE_TITLE=$(cat issues.json | jq -r '.[0].title')
              echo "task=${ISSUE_TITLE#Auto Task: }" >> $GITHUB_OUTPUT
              echo "source=issue_$ISSUE_NUM"
              echo "issue_number=$ISSUE_NUM" >> $GITHUB_OUTPUT
            else
              echo "task=" >> $GITHUB_OUTPUT
              echo "source=none"
            fi
          fi

      - name: Show Task
        if: steps.task.outputs.task != ''
        run: |
          echo "=== TASK ==="
          echo "${{ steps.task.outputs.task }}"
          echo "=== SOURCE ==="
          echo "${{ steps.task.outputs.source }}"
          echo "============="

      - name: Execute Task
        if: steps.task.outputs.task != ''
        run: |
          opencode "${{ steps.task.outputs.task }}" || true

      - name: Commit Changes
        id: commit
        if: steps.task.outputs.task != ''
        run: |
          rm -f issues.json
          git config user.name "AIHub Bot"
          git config user.email "aihub@ocop.ai"
          BRANCH="autonomous/$(date +%s)"
          git checkout -b "$BRANCH"
          git add -A
          git diff --cached --stat || echo "No changes"
          if git commit -m "[AIHub] ${{ steps.task.outputs.task }}"; then
            git push -u origin HEAD || echo "Push failed"
            echo "branch=$BRANCH" >> $GITHUB_OUTPUT
            gh pr create --title "[AIHub] ${{ steps.task.outputs.task }}" --body "Auto-generated by AIHub" --base main || echo "PR creation failed"
          else
            echo "No changes to commit"
          fi

      - name: Report
        run: |
          echo "Done - source: ${{ steps.task.outputs.source }}"
          echo "Branch: ${{ steps.commit.outputs.branch }}"